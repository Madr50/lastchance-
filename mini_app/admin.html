<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Twitter Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1DA1F2;
            --danger: #ff1744;
            --success: #00C853;
            --warning: #FFD600;
            --bg: #0a0a0f;
            --card: #12121a;
            --border: #2a2a3a;
            --text: #fff;
            --text-muted: #8899a6;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .admin-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }

        .admin-header h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary);
        }

        .admin-header p {
            color: var(--text-muted);
            margin-top: 5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-card .label {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 5px;
        }

        .section {
            padding: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* نموذج إضافة حساب */
        .form-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group input[type="file"] {
            padding: 10px;
        }

        /* جدول الحسابات */
        .accounts-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
        }

        .accounts-table th,
        .accounts-table td {
            padding: 14px;
            text-align: right;
            border-bottom: 1px solid var(--border);
        }

        .accounts-table th {
            background: rgba(29,161,242,0.1);
            font-weight: 700;
            color: var(--primary);
        }

        .accounts-table tr:hover {
            background: rgba(255,255,255,0.02);
        }

        .accounts-table img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-available { background: rgba(0,200,83,0.2); color: var(--success); }
        .badge-sold { background: rgba(255,23,68,0.2); color: var(--danger); }

        .action-btns {
            display: flex;
            gap: 6px;
        }

        .action-btns button {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .edit-btn { background: var(--warning); color: #000; }
        .delete-btn { background: var(--danger); color: white; }

        /* Responsive */
        @media (max-width: 768px) {
            .accounts-table {
                font-size: 12px;
            }
            .accounts-table th,
            .accounts-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>⚙️ لوحة التحكم</h1>
        <p>إدارة حسابات Twitter X Shop</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="number" id="totalAccounts">0</div>
            <div class="label">إجمالي الحسابات</div>
        </div>
        <div class="stat-card">
            <div class="number" id="availableAccounts">0</div>
            <div class="label">متاحة</div>
        </div>
        <div class="stat-card">
            <div class="number" id="soldAccounts">0</div>
            <div class="label">مباعة</div>
        </div>
        <div class="stat-card">
            <div class="number" id="totalRevenue">0$</div>
            <div class="label">إجمالي المبيعات</div>
        </div>
    </div>

    <!-- نموذج إضافة حساب -->
    <div class="section">
        <h2 class="section-title">➕ إضافة حساب جديد</h2>
        <div class="form-card">
            <form id="addAccountForm" onsubmit="addAccount(event)">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>اسم الحساب *</label>
                        <input type="text" id="accName" required placeholder="مثال: حساب تويتر 2010">
                    </div>
                    <div class="form-group">
                        <label>السعر (USD) *</label>
                        <input type="number" id="accPrice" required placeholder="150" step="0.01">
                    </div>
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="accDesc" rows="3" placeholder="وصف تفصيلي للحساب..."></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>الفئة</label>
                        <select id="accCategory">
                            <option value="twitter">Twitter/X</option>
                            <option value="instagram">Instagram</option>
                            <option value="other">أخرى</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>صورة المنتج</label>
                        <input type="file" id="accImage" accept="image/*">
                    </div>
                </div>
                <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 10px;">
                    💾 حفظ الحساب
                </button>
            </form>
        </div>
    </div>

    <!-- قائمة الحسابات -->
    <div class="section">
        <h2 class="section-title">📋 الحسابات</h2>
        <div style="overflow-x: auto;">
            <table class="accounts-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الصورة</th>
                        <th>الاسم</th>
                        <th>السعر</th>
                        <th>الحالة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="accountsTableBody">
                    <!-- يتم ملؤها ديناميكياً -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // التحقق من الأدمن
        const user = tg.initDataUnsafe.user;
        if (!user || user.id !== 123456789) {  // غير هذا لـ ID تبعك
            document.body.innerHTML = '<div style="text-align:center;padding:100px;"><h1>⛔ وصول مرفوض</h1><p>هذه الصفحة للأدمن فقط</p></div>';
        }

        let accounts = [];

        async function loadData() {
            // جلب البيانات من API
            try {
                const res = await fetch('/api/accounts?admin=1');
                accounts = await res.json();
                updateStats();
                renderTable();
            } catch (e) {
                // بيانات تجريبية
                accounts = [
                    {id: 1, name: "حساب 2010", price: 150, status: "available", image: ""},
                    {id: 2, name: "حساب 2012", price: 280, status: "sold", image: ""}
                ];
                updateStats();
                renderTable();
            }
        }

        function updateStats() {
            document.getElementById('totalAccounts').textContent = accounts.length;
            document.getElementById('availableAccounts').textContent = accounts.filter(a => a.status === 'available').length;
            document.getElementById('soldAccounts').textContent = accounts.filter(a => a.status === 'sold').length;
        }

        function renderTable() {
            const tbody = document.getElementById('accountsTableBody');
            tbody.innerHTML = accounts.map(acc => `
                <tr>
                    <td>${acc.id}</td>
                    <td><img src="${acc.image || 'https://via.placeholder.com/50'}" alt=""></td>
                    <td>${acc.name}</td>
                    <td>${acc.price}$</td>
                    <td><span class="badge badge-${acc.status}">${acc.status === 'available' ? '✅ متاح' : '❌ مباع'}</span></td>
                    <td>
                        <div class="action-btns">
                            <button class="edit-btn" onclick="editAccount(${acc.id})">✏️</button>
                            <button class="delete-btn" onclick="deleteAccount(${acc.id})">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function addAccount(e) {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('name', document.getElementById('accName').value);
            formData.append('price', document.getElementById('accPrice').value);
            formData.append('description', document.getElementById('accDesc').value);
            formData.append('category', document.getElementById('accCategory').value);
            
            const imageFile = document.getElementById('accImage').files[0];
            if (imageFile) formData.append('image', imageFile);

            try {
                await fetch('/api/accounts', {
                    method: 'POST',
                    body: formData
                });
                tg.showAlert('✅ تم إضافة الحساب بنجاح!');
                document.getElementById('addAccountForm').reset();
                loadData();
            } catch (err) {
                tg.showAlert('❌ خطأ: ' + err.message);
            }
        }

        function editAccount(id) {
            const acc = accounts.find(a => a.id === id);
            if (!acc) return;
            
            document.getElementById('accName').value = acc.name;
            document.getElementById('accPrice').value = acc.price;
            document.getElementById('accDesc').value = acc.description || '';
            
            window.scrollTo({top: 0, behavior: 'smooth'});
            tg.showAlert('✏️ عدل البيانات واضغط حفظ');
        }

        async function deleteAccount(id) {
            if (!confirm('هل أنت متأكد من الحذف؟')) return;
            
            try {
                await fetch(`/api/accounts/${id}`, {method: 'DELETE'});
                tg.showAlert('🗑️ تم الحذف!');
                loadData();
            } catch (e) {
                tg.showAlert('❌ خطأ في الحذف');
            }
        }

        loadData();
    </script>
</body>
</html>
