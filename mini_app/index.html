<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Twitter X Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1DA1F2;
            --primary-dark: #0d8bd9;
            --secondary: #14171A;
            --accent: #FF6B35;
            --success: #00C853;
            --bg: #0a0a0f;
            --card: #12121a;
            --card-hover: #1a1a28;
            --text: #ffffff;
            --text-muted: #8899a6;
            --border: #2a2a3a;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --glow: 0 0 20px rgba(29,161,242,0.3);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(29,161,242,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255,107,53,0.06) 0%, transparent 50%);
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(29,161,242,0.03) 2px,
                rgba(29,161,242,0.03) 4px
            );
            animation: scan 20s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* الهيدر */
        .header {
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #1DA1F2, #FF6B35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* شريط البحث والفلاتر */
        .controls {
            padding: 0 20px 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 14px 45px 14px 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--card);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(29,161,242,0.2);
        }

        .search-box::after {
            content: '🔍';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* شبكة المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 0 20px 100px;
        }

        /* كارت المنتج */
        .product-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow), var(--glow);
            border-color: rgba(29,161,242,0.3);
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .product-card:hover .product-image img {
            transform: scale(1.1);
        }

        .product-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--success);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            z-index: 2;
        }

        .product-badge.sold {
            background: #ff1744;
        }

        .product-info {
            padding: 18px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text);
        }

        .product-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 22px;
            font-weight: 800;
            color: var(--accent);
        }

        .product-price span {
            font-size: 14px;
            color: var(--text-muted);
        }

        .buy-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .buy-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .buy-btn:hover::after {
            width: 300px;
            height: 300px;
        }

        .buy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(29,161,242,0.4);
        }

        .buy-btn:active {
            transform: scale(0.95);
        }

        /* نافذة التفاصيل */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            max-width: 420px;
            width: 100%;
            overflow: hidden;
            animation: modalIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .modal-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .modal-details {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: var(--text-muted);
        }

        .detail-value {
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions button {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }

        /* شريط سفلي */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 11px;
            transition: color 0.3s;
        }

        .nav-item.active, .nav-item:hover {
            color: var(--primary);
        }

        .nav-item .icon {
            font-size: 22px;
        }

        /* تحميل */
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* رسالة فارغة */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state .icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-muted);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--card);
            border: 1px solid var(--primary);
            color: var(--text);
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            z-index: 2000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
                gap: 16px;
                padding: 0 12px 100px;
            }
            
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="header">
        <h1>🐦 Twitter X Shop</h1>
        <p>حسابات إنشاءات قديمة | موثوقة 100%</p>
    </div>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ابحث عن حساب..." oninput="filterAccounts()">
        </div>
    </div>

    <div id="productsContainer" class="products-grid">
        <div class="loader">
            <div class="loader-spinner"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <img id="modalImage" class="modal-image" src="" alt="">
            <div class="modal-body">
                <h2 class="modal-title" id="modalTitle"></h2>
                <div class="modal-price" id="modalPrice"></div>
                <div class="modal-details" id="modalDetails"></div>
                <div class="modal-actions">
                    <button class="btn-primary" onclick="buyAccount()">🛒 شراء الآن</button>
                    <button class="btn-secondary" onclick="closeModal()">❌ إغلاق</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Bottom Navigation -->
    <div class="bottom-bar">
        <a href="#" class="nav-item active" onclick="showToast('أنت هنا بالفعل!')">
            <span class="icon">🏠</span>
            <span>الرئيسية</span>
        </a>
        <a href="#" class="nav-item" onclick="filterByCategory('twitter')">
            <span class="icon">🐦</span>
            <span>تويتر</span>
        </a>
        <a href="#" class="nav-item" onclick="showToast('قريباً!')">
            <span class="icon">📦</span>
            <span>طلباتي</span>
        </a>
        <a href="#" class="nav-item" onclick="showToast('تواصل مع @YOUR_USERNAME')">
            <span class="icon">💬</span>
            <span>الدعم</span>
        </a>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        // تفعيل الألوان
        tg.setHeaderColor('#0a0a0f');
        tg.setBackgroundColor('#0a0a0f');

        let accounts = [];
        let currentAccount = null;

        // جلب الحسابات من API
        async function loadAccounts() {
            try {
                // هنا تستبدل بالـ API حقك
                // مؤقتاً نستخدم بيانات وهمية للعرض
                const response = await fetch('/api/accounts');
                accounts = await response.json();
                renderAccounts(accounts);
            } catch (e) {
                // بيانات تجريبية للعرض
                accounts = [
                    {
                        id: 1,
                        name: "حساب تويتر 2010",
                        description: "حساب قديم إنشاء 2010، متابعين 5K، نشيط",
                        price: 150,
                        image: "https://via.placeholder.com/400x300/1DA1F2/ffffff?text=Twitter+2010",
                        status: "available",
                        created: "2010-03-15"
                    },
                    {
                        id: 2,
                        name: "حساب تويتر 2012",
                        description: "حساب قديم إنشاء 2012، متابعين 12K، موثق",
                        price: 280,
                        image: "https://via.placeholder.com/400x300/FF6B35/ffffff?text=Twitter+2012",
                        status: "available",
                        created: "2012-07-20"
                    },
                    {
                        id: 3,
                        name: "حساب تويتر 2015",
                        description: "حساب إنشاء 2015، متابعين 25K، نشيط يومياً",
                        price: 450,
                        image: "https://via.placeholder.com/400x300/14171A/ffffff?text=Twitter+2015",
                        status: "available",
                        created: "2015-01-10"
                    }
                ];
                renderAccounts(accounts);
            }
        }

        function renderAccounts(data) {
            const container = document.getElementById('productsContainer');
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="icon">😔</div>
                        <h3>لا توجد حسابات متاحة</h3>
                        <p>تفقد لاحقاً، سيتم إضافة حسابات جديدة قريباً</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = data.map(acc => `
                <div class="product-card" onclick="openModal(${acc.id})">
                    <div class="product-image">
                        <span class="product-badge ${acc.status === 'sold' ? 'sold' : ''}">
                            ${acc.status === 'available' ? '✅ متاح' : '❌ مباع'}
                        </span>
                        <img src="${acc.image}" alt="${acc.name}" onerror="this.style.display='none'; this.parentElement.innerHTML+= '🐦'">
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${acc.name}</h3>
                        <p class="product-desc">${acc.description}</p>
                        <div class="product-footer">
                            <div class="product-price">${acc.price}$ <span>USD</span></div>
                            <button class="buy-btn">شراء</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterAccounts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = accounts.filter(acc => 
                acc.name.toLowerCase().includes(query) || 
                acc.description.toLowerCase().includes(query)
            );
            renderAccounts(filtered);
        }

        function filterByCategory(cat) {
            showToast('🔍 تصفية: ' + cat);
        }

        function openModal(id) {
            currentAccount = accounts.find(a => a.id === id);
            if (!currentAccount) return;

            document.getElementById('modalImage').src = currentAccount.image;
            document.getElementById('modalTitle').textContent = currentAccount.name;
            document.getElementById('modalPrice').textContent = currentAccount.price + '$ USD';
            document.getElementById('modalDetails').innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">📅 سنة الإنشاء</span>
                    <span class="detail-value">${currentAccount.created}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">📋 الوصف</span>
                    <span class="detail-value">${currentAccount.description}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">🏷️ الحالة</span>
                    <span class="detail-value">${currentAccount.status === 'available' ? '✅ متاح' : '❌ مباع'}</span>
                </div>
            `;
            
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
            currentAccount = null;
        }

        function buyAccount() {
            if (!currentAccount) return;
            
            // إرسال بيانات للبوت
            tg.sendData(JSON.stringify({
                action: 'buy',
                account_id: currentAccount.id
            }));
            
            showToast('✅ تم إرسال طلب الشراء!');
            closeModal();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // تحميل البيانات
        loadAccounts();
    </script>
</body>
</html>
