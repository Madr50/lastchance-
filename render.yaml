services:
  - type: web
    name: twitter-x-shop
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false        # set manually in Render dashboard
      - key: ADMIN_ID
        value: "8989271393"
      - key: ADMIN_USERNAME
        value: "l825h"
      - key: SHOP_NAME
        value: "Twitter X Shop"
      - key: WEBAPP_URL
        sync: false        # set to your Render public URL after first deploy
