<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>𝕏 Account Shop</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/shop.css"/>
</head>
<body>

<!-- Ambient background orbs -->
<div class="bg-orbs" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- ── Header ─────────────────────────────────────── -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">𝕏</div>
      <div class="logo-text">
        <span class="logo-title">Account Shop</span>
        <span class="logo-sub">حسابات تويتر/X القديمة</span>
      </div>
    </div>
    <button class="search-toggle" id="searchToggle" aria-label="Search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
  </div>
  <div class="search-bar" id="searchBar">
    <div class="search-inner">
      <svg class="search-icon-sm" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" type="text" placeholder="ابحث عن حسابات…" autocomplete="off" autocorrect="off"/>
      <button id="searchClear" class="search-clear hidden">✕</button>
    </div>
  </div>
</header>

<!-- ── Filter Pills ───────────────────────────────── -->
<div class="filter-bar">
  <div class="filter-track">
    <button class="pill active" data-year="all">
      <span class="pill-dot"></span><span>الكل</span>
    </button>
    <button class="pill" data-year="2010"><span>2010</span></button>
    <button class="pill" data-year="2011"><span>2011</span></button>
    <button class="pill" data-year="2012"><span>2012</span></button>
    <button class="pill" data-year="2013"><span>2013</span></button>
    <button class="pill" data-year="2014"><span>2014</span></button>
    <button class="pill" data-year="2015"><span>2015</span></button>
  </div>
</div>

<!-- ── Stats Bar ──────────────────────────────────── -->
<div class="stats-bar" id="statsBar"></div>

<!-- ── Grid ──────────────────────────────────────── -->
<main class="main">

  <!-- Loading skeletons -->
  <div id="loadingState" class="grid">
    <div class="skeleton-card"><div class="sk-img"></div><div class="sk-body"><div class="sk-line sk-w60"></div><div class="sk-line sk-w40"></div><div class="sk-line sk-w80 sk-price"></div></div></div>
    <div class="skeleton-card"><div class="sk-img"></div><div class="sk-body"><div class="sk-line sk-w80"></div><div class="sk-line sk-w60"></div><div class="sk-line sk-w50 sk-price"></div></div></div>
    <div class="skeleton-card"><div class="sk-img"></div><div class="sk-body"><div class="sk-line sk-w50"></div><div class="sk-line sk-w70"></div><div class="sk-line sk-w60 sk-price"></div></div></div>
    <div class="skeleton-card"><div class="sk-img"></div><div class="sk-body"><div class="sk-line sk-w70"></div><div class="sk-line sk-w40"></div><div class="sk-line sk-w55 sk-price"></div></div></div>
  </div>

  <div id="emptyState" class="empty hidden">
    <div class="empty-glyph">𝕏</div>
    <h3>لا توجد حسابات متاحة</h3>
    <p>حسابات جديدة تُضاف باستمرار — تابعنا!</p>
  </div>

  <div id="accountsGrid" class="grid"></div>
</main>

<!-- ── Detail Modal ───────────────────────────────── -->
<div id="modal" class="sheet-overlay hidden">
  <div class="sheet" id="sheetCard">
    <div class="sheet-handle"></div>

    <div id="modalImageWrap" class="sheet-hero"></div>

    <div class="sheet-body">
      <div class="sheet-meta" id="sheetMeta"></div>
      <h2 id="modalName" class="sheet-name"></h2>
      <p id="modalDesc" class="sheet-desc"></p>

      <div class="sheet-price-row">
        <div>
          <div class="sheet-price" id="modalPrice"></div>
          <div class="sheet-price-sub">USD · تسليم فوري</div>
        </div>
        <div class="trust-icons">
          <span title="Verified">✅</span>
          <span title="Secure">🔒</span>
        </div>
      </div>

      <button id="modalBuyBtn" class="buy-btn">
        <span class="buy-btn-inner">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          اشتري الآن
        </span>
        <span class="buy-ripple"></span>
      </button>

      <div class="sheet-note">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        تواصل مع <strong>@l825h</strong> برقم طلبك لإتمام الدفع
      </div>
    </div>
  </div>
</div>

<!-- ── Success Modal ──────────────────────────────── -->
<div id="successModal" class="sheet-overlay hidden">
  <div class="sheet success-sheet">
    <div class="sheet-handle"></div>
    <div class="success-anim">
      <div class="success-ring"></div>
      <svg class="success-check" viewBox="0 0 52 52">
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1d9bf0"/>
            <stop offset="100%" style="stop-color:#8b5cf6"/>
          </linearGradient>
        </defs>
        <circle class="check-circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="check-tick" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
      </svg>
    </div>
    <h2 class="success-title">🎉 تم الطلب بنجاح!</h2>
    <div id="successDetails" class="success-details"></div>
    <button id="successClose" class="buy-btn success-btn">فهمت!</button>
  </div>
</div>

<!-- ── Toast ──────────────────────────────────────── -->
<div id="toast" class="toast"></div>

<script src="/static/js/shop.js"></script>
</body>
</html>
